<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline • AI Study Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      max-width: 420px;
      padding: 40px;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }
    .icon {
      width: 56px;
      height: 56px;
      background-color: #312e81;
      color: #818cf8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0 0 10px 0;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: #1e1b4b;
      border: 1px solid #312e81;
      color: #a5b4fc;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 9999px;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 8px #ef4444;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #4f46e5;
      color: #ffffff;
      border: none;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.1s ease;
      width: 100%;
      box-sizing: border-box;
    }
    .btn:hover {
      background-color: #4338ca;
    }
    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.284 16.284A3 3 0 0012 21m0 0a3 3 0 003.716-4.716M12 21V12m0 0L8.284 8.284M12 12l3.716-3.716M12 3v9m0 0l-3.716 3.716M12 12l3.716 3.716" />
      </svg>
    </div>
    
    <div class="status-badge">
      <span class="status-dot"></span>
      Connection Suspended
    </div>

    <h1>Workspace is offline</h1>
    <p>You are currently offline. Local session capabilities and read access remain operational. We will automatically reconnect when your signal is restored.</p>
    
    <button class="btn" onclick="window.location.reload()">Check Connection</button>
  </div>
</body>
</html>
